<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Stockdle</title>
    <link rel="stylesheet" type="text/css" href="StyleSheet1.css" />
</head>
<body>
    <div id="Container">
        <h1>hello</h1>
        <div id="title">
            <h2>Stockdle</h2>
        </div>

        <!-- Each setting has an individual button-->
        <div id="settings">
            <div id="settingsButton1">

            </div>
            <div id="settingsButton2">

            </div>
            <div id="settingsButton3">

            </div>
            <div id="settingsButton4">

            </div>
        </div>

        <!-- Divider line forms a break between the top section and the stock chart & buttons-->
        <div id="dividerLine">

        </div>
        <div id="mainButtons">
            <div id="symbolButton">

            </div>
            <div id="timeButton">

            </div>
            <div id="clearButton">

            </div>
            <div id="enterButton">

            </div>
        </div>
        <!-- Stockdle starts here-->
        <canvas>

            <div id="stockChartMain">

            </div>
            <div id="stockChartsOld">
                <div id="stockChartOld1">

                </div>
                <div id="stockChartOld2">

                </div>
                <div id="stockChartOld3">

                </div>
                <div id="stockChartOld4">

                </div>
            </div>
        </canvas>

        <!-- Section for information about reading stocks-->
        <div id="stockInfo">

        </div>
    </div>
</body>
</html>
