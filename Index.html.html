<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Stockdle</title>
    <link rel="stylesheet" href="StyleSheet1.css">
</head>

<body>

    <!-- STICKY HEADER -->
    <div id="headerBar">
        <div id="headerContent">

            <!-- LEFT: LOGO -->
            <div id="logo">Stockdle</div>

            <!-- RIGHT: BUTTONS -->
            <div id="topButtons">
                <button class="topBtn">How to Play</button>
                <button class="topBtn">Stats</button>
                <button class="topBtn">Settings</button>
                <button class="topBtn">Practice Mode</button>
            </div>

        </div>
    </div>

    <div id="Container">

        <!-- Divider -->
        <div id="dividerLine"></div>

        <!-- MAIN BUTTONS -->
        <div id="mainButtons">
            <div id="symbolButton" class="infoBox">Symbol</div>
            <div id="timeButton" class="infoBox">Jun 22, 2023 10:15 AM</div>

            <button id="clearButton">Clear</button>
            <button id="enterButton">Enter</button>
        </div>

        <!-- MAIN STOCK CHART -->
        <div id="stockChartMain">
            <canvas id="mainCanvas"></canvas>
            <canvas id="secondaryCanvas"></canvas>
        </div>

        <!-- OLD CHARTS -->
        
        <div id="stockChartsOld">
            <div class="oldChart"><canvas></canvas></div>
            <div class="oldChart"><canvas></canvas></div>
            <div class="oldChart"><canvas></canvas></div>
            <div class="oldChart"><canvas></canvas></div>
        </div>

        <!-- INFO SECTION -->
        <div id="stockInfo">
            <h2>How to Read Stock Charts</h2>
            <div class="infoContent"></div>
        </div>

        <div id="dividerLine"></div>
    </div>

    <script>
        const mainCanvas = document.getElementById("mainCanvas");
        const mainCtx = mainCanvas.getContext("2d");

        const enterButton = document.getElementById("enterButton");
        const clearButton = document.getElementById("clearButton");
        const oldChartsContainer = document.getElementById("stockChartsOld");

        // Get all old chart slots
        let oldCharts = Array.from(document.querySelectorAll(".oldChart"));

        // 🔹 Hide all old charts at start
        oldCharts.forEach(chart => {
            chart.style.display = "none";
        });

        // 🔹 CLEAR BUTTON
        clearButton.addEventListener("click", () => {
            mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
        });

        // 🔹 ENTER BUTTON LOGIC
        enterButton.addEventListener("click", () => {

            // Create a new canvas snapshot
            const newCanvas = document.createElement("canvas");
            newCanvas.width = mainCanvas.width;
            newCanvas.height = mainCanvas.height;

            const newCtx = newCanvas.getContext("2d");

            // Copy main canvas into new one
            newCtx.drawImage(mainCanvas, 0, 0);

            // Move charts DOWN (shift existing ones)
            for (let i = oldCharts.length - 1; i > 0; i--) {
                const prevCanvas = oldCharts[i - 1].querySelector("canvas");
                const currentCanvas = oldCharts[i].querySelector("canvas");

                const ctx = currentCanvas.getContext("2d");
                ctx.clearRect(0, 0, currentCanvas.width, currentCanvas.height);

                ctx.drawImage(prevCanvas, 0, 0);

                oldCharts[i].style.display = "block";
            }

            // Put newest chart at top
            const topCanvas = oldCharts[0].querySelector("canvas");
            const topCtx = topCanvas.getContext("2d");

            topCtx.clearRect(0, 0, topCanvas.width, topCanvas.height);
            topCtx.drawImage(newCanvas, 0, 0);

            oldCharts[0].style.display = "block";

            // Ensure max of 4 (last one always exists but overwritten)
            oldCharts[oldCharts.length - 1].style.display = "block";
        });
    </script>

</body>
</html>
